<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#0051D5"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Photo frame -->
  <rect x="28" y="32" width="72" height="56" rx="6" fill="#fff" opacity="0.95"/>

  <!-- Mountain landscape inside photo -->
  <polygon points="28,76 48,52 68,68 88,48 100,60 100,88 28,88" fill="#E8F0FE"/>
  <polygon points="28,82 44,64 64,80 84,60 100,74 100,88 28,88" fill="#B3D4FC"/>

  <!-- Sun -->
  <circle cx="82" cy="48" r="8" fill="#FFD54F"/>

  <!-- GPS Pin overlapping the photo -->
  <g transform="translate(64, 78)">
    <path d="M0,-18 C-9.9,-18 -18,-10.6 -18,-2 C-18,6.6 0,22 0,22 C0,22 18,6.6 18,-2 C18,-10.6 9.9,-18 0,-18 Z" fill="#FF3B30"/>
    <circle cx="0" cy="-4" r="6" fill="#fff"/>
  </g>
</svg>
