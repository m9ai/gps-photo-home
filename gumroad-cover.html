<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS-Photo Pro Cover</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 720px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .content {
      text-align: center;
      color: white;
      padding: 60px;
    }
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 40px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon svg {
      width: 64px;
      height: 64px;
    }
    h1 {
      font-size: 72px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }
    .subtitle {
      font-size: 32px;
      font-weight: 400;
      opacity: 0.9;
      margin-bottom: 40px;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 12px 32px;
      border-radius: 50px;
      font-size: 24px;
      font-weight: 600;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .features {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 50px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      opacity: 0.85;
    }
    .feature-item svg {
      width: 24px;
      height: 24px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="18" height="18" rx="4" fill="#007aff"/>
        <circle cx="12" cy="12" r="3" fill="white"/>
        <path d="M12 5V3M12 21v-2M5 12H3m18 0h-2M7.05 7.05L5.64 5.64m12.72 12.72l-1.41-1.41M7.05 16.95l-1.41 1.41m12.72-12.72l-1.41 1.41" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>GPS-Photo Pro</h1>
    <p class="subtitle">Write GPS metadata into your photos locally</p>
    <div class="badge">Lifetime License</div>
    <div class="features">
      <div class="feature-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Batch Processing
      </div>
      <div class="feature-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        Location Templates
      </div>
      <div class="feature-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        History
      </div>
    </div>
  </div>
</body>
</html>
