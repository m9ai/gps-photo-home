<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS-Photo Pro Thumbnail</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 600px;
      height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .content {
      text-align: center;
      color: white;
    }
    .icon {
      width: 160px;
      height: 160px;
      margin: 0 auto 30px;
      background: white;
      border-radius: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 50px rgba(0,0,0,0.3);
    }
    .icon svg {
      width: 90px;
      height: 90px;
    }
    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 22px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="18" height="18" rx="4" fill="#007aff"/>
        <circle cx="12" cy="12" r="3" fill="white"/>
        <path d="M12 5V3M12 21v-2M5 12H3m18 0h-2M7.05 7.05L5.64 5.64m12.72 12.72l-1.41-1.41M7.05 16.95l-1.41 1.41m12.72-12.72l-1.41 1.41" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>GPS-Photo</h1>
    <p class="subtitle">Pro Lifetime</p>
  </div>
</body>
</html>
